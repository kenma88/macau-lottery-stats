<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>登录 - 新澳门六合彩开奖统计表</title>
    <link rel="stylesheet" href="/styles.css?v=20260628-8" />
  </head>
  <body class="login-body">
    <main class="login-shell">
      <section class="login-panel" aria-labelledby="loginTitle">
        <div class="login-brand">
          <div class="brand-mark">澳</div>
          <div>
            <h1 id="loginTitle">请输入访问密码</h1>
            <p>登录后即可查看和编辑统计表。</p>
          </div>
        </div>

        <form id="loginForm" class="login-form">
          <label>
            <span>访问密码</span>
            <input id="passwordInput" type="password" placeholder="请输入密码" autocomplete="current-password" required />
          </label>
          <button type="submit" class="primary-button">进入统计表</button>
          <p id="loginError" class="login-error" hidden></p>
        </form>
      </section>
    </main>

    <script src="/login/login.js?v=20260628-8"></script>
  </body>
</html>
